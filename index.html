<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Mini Kanban Board</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <h1>Kanban Board</h1>
    <div class="board">
        <div class="column" data-status="todo">
            <div class="task-heading">
                <h2>Todo</h2>
                <div class="total-tasks">0</div>
            </div>
            <div class="tasks">
                <div class="task" draggable="true">Add LocalStorage persistence</div>
                <div class="task" draggable="true">Delete a task</div>
            </div>
            <button class="add-btn">+ Add Task</button>
        </div>
        <div class="column" data-status="inprogress">
            <div class="task-heading">
                <h2>In Progress</h2>
                <div class="total-tasks">0</div>
            </div>
            <div class="tasks">
                <div class="task" draggable="true">Create basic HTML layout</div>
                <div class="task" draggable="true">Add CSS styling for columns</div>
                <div class="task" draggable="true">Design Kanban board UI wireframe</div>
            </div>
            <button class="add-btn">+ Add Task</button>
        </div>
        <div class="column" data-status="done">
            <div class="task-heading">
                <h2>Done</h2>
                <div class="total-tasks">0</div>
            </div>
            <div class="tasks">
                <div class="task" draggable="true">Setup project folder structure</div>
            </div>
            <button class="add-btn">+ Add Task</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
